<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Orders - Foodies</title>

<style>
body { font-family: Arial, sans-serif; background:#fff8f5; }
h2 { text-align:center; margin:20px 0; color:#e63946; }
.orders-list { max-width: 600px; margin:auto; display:flex; flex-direction:column; gap:15px; }
.order-card { background:white; padding:15px; border-radius:10px; display:flex; gap:15px; align-items:center; box-shadow:0 3px 8px rgba(0,0,0,0.15); }
.order-card img { width:80px; height:80px; border-radius:10px; object-fit:cover; }
.cancel-btn { background:#ff4d4d; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; }
.back-btn { display:block; margin:20px auto; width:200px; text-align:center; padding:10px; background:#e63946; color:white; border-radius:6px; text-decoration:none; }
</style>
</head>

<body>
<h2>📦 Your Orders</h2>
<div id="ordersList" class="orders-list"></div>
<a class="back-btn" href="food website.html">← Back to Home</a>

<script>
function loadOrders(){
  const ordersList = document.getElementById("ordersList");
  let orders = JSON.parse(localStorage.getItem("foodOrders")) || [];

  if (orders.length === 0) {
    ordersList.innerHTML = "<p style='text-align:center;'>No orders yet.</p>";
    return;
  }

  ordersList.innerHTML = "";
  orders.forEach((order, index) => {
    const div = document.createElement("div");
    div.classList.add("order-card");

    div.innerHTML = `
      <img src="${order.image}">
      <div>
        <h3>${order.name}</h3>
        <p>${order.desc}</p>
        <p><b>Price:</b> ${order.price} × ${order.quantity}</p>
        <p><b>Address:</b> ${order.address}</p>
        <p style="color:green; font-weight:bold;">${order.status}</p>
        <button class="cancel-btn" onclick="cancelOrder(${index})">Cancel Order</button>
      </div>
    `;
    ordersList.appendChild(div);
  });
}

function cancelOrder(index){
  let orders = JSON.parse(localStorage.getItem("foodOrders")) || [];
  orders.splice(index, 1);
  localStorage.setItem("foodOrders", JSON.stringify(orders));
  loadOrders();
}

loadOrders();
</script>
</body>
</html>
